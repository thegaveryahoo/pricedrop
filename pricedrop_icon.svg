<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8c2e"/>
      <stop offset="100%" stop-color="#ff5555"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Price tag shape -->
  <g transform="translate(256,256)">
    <!-- Down arrow (price drop) -->
    <path d="M0,-120 L70,0 L30,0 L30,100 L-30,100 L-30,0 L-70,0 Z" fill="white" opacity="0.95" transform="translate(0,10)"/>
    <!-- Euro sign -->
    <circle cx="0" cy="-20" r="45" fill="none" stroke="white" stroke-width="12" opacity="0.3"/>
  </g>
  <!-- Badge -->
  <circle cx="400" cy="112" r="72" fill="#1dba6a"/>
  <text x="400" y="126" text-anchor="middle" font-size="64" font-weight="bold" fill="white" font-family="system-ui">€</text>
</svg>
