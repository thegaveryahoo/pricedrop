name: PriceDrop Scanner

on:
  schedule:
    # Elke 15 minuten draaien
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Handmatig triggeren vanuit GitHub UI

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium
          playwright install-deps chromium

      - name: Run scanner
        run: python scanner.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # Verwijder ibood_deals.json als het verwerkt is door scanner
          if [ ! -f ibood_deals.json ]; then
            git rm -f ibood_deals.json 2>/dev/null || true
          fi
          git add -A ibood_deals.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Geen wijzigingen"
          else
            git commit -m "Update deals data [$(date +'%d-%m-%Y %H:%M')]"
            # Pull+rebase om conflicten met lokale pushes te voorkomen
            git pull --rebase origin master
            git push
          fi
