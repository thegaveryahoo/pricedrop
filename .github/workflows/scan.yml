name: PriceDrop Scanner

on:
  schedule:
    # Elke 15 minuten draaien
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Handmatig triggeren vanuit GitHub UI

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium
          playwright install-deps chromium

      - name: Run scanner
        run: python scanner.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "Geen wijzigingen in docs/"
          else
            git commit -m "Update deals data [$(date +'%d-%m-%Y %H:%M')]"
            git push
          fi
